name: Publish to PyPI

# Builds sdist + wheel and publishes to PyPI via OIDC Trusted Publisher.
# Triggers on:
#   - Pushing a tag matching v* (e.g. v2.0.0, v2.1.0-rc1)
#   - Publishing a GitHub release
#
# Trusted Publisher config (set once at https://pypi.org/manage/account/publishing/):
#   PyPI Project Name: claude-writ
#   Owner:             infinri
#   Repository name:   Writ
#   Workflow name:     publish.yml
#   Environment name:  pypi
#
# This workflow does not require a PYPI_API_TOKEN secret; PyPI verifies the
# GitHub Actions OIDC claim against the trusted publisher registration.

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify artifacts
        run: |
          ls -la dist/
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/claude-writ/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
