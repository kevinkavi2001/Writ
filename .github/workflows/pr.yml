name: PR checks

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    # Timeout sized from local wall-clock measurement on 2026-05-13:
    # full pytest run is ~88s (1502 passed, 14 skipped) after the
    # test-order-dependent flake in TestOnnxRankingStability was
    # skip-marked (commit 231ee41). Setup adds:
    #   - pip install -e '.[dev]' with cuda/torch transitives: ~3-5 min
    #   - scripts/migrate.py (rule corpus ingest): ~30s
    #   - scripts/export_onnx.py (HF download + ORT export): ~1-2 min
    # Total job runtime ~6-9 min on a typical runner. 15-minute timeout
    # leaves slack for slow GitHub runners and HF download variance
    # without letting a stuck job run indefinitely.
    timeout-minutes: 15
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/writdevpass
        ports:
          - 7687:7687
          - 7474:7474
        # cypher-shell healthcheck matches docker-compose.yml so CI and
        # local both define "healthy" the same way. health-start-period
        # gives Neo4j 5 time to initialize before the first probe.
        options: >-
          --health-cmd "cypher-shell -u neo4j -p writdevpass 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-writ
      - name: Run tests
        run: make test

  bench:
    name: bench
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/writdevpass
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p writdevpass 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-writ
      - name: Run benchmarks
        run: make bench
