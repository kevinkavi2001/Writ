[source]
canonical = "neo4j"
exported_view = "bible/"

[service]
host = "localhost"
port = 8765
timeout_ms = 50
log_level = "INFO"

[neo4j]
uri = "bolt://localhost:7687"
user = "neo4j"
password = "writdevpass"
database = "neo4j"

[embedding]
model = "all-MiniLM-L6-v2"
dimensions = 384
# cache_dir default is ~/.cache/writ/models (see writ/retrieval/embeddings.py).
# Override with an absolute path, not a tilde literal -- TOML does not expand ~.

[vector]
backend = "hnswlib"
ef_construction = 200
ef_search = 50
M = 16

[vector.qdrant]
url = "http://localhost:6333"
collection = "writ_rules"

[hnsw]
# cache_dir default is ~/.cache/writ/hnsw (see writ/config.py).
# get_hnsw_cache_dir() expands ~ on read, but prefer an absolute path here.

[tantivy]
fields = ["trigger", "statement", "tags"]

[ranking]
w_bm25 = 0.198
w_vector = 0.594
w_severity = 0.099
w_confidence = 0.099
w_graph = 0.01

[ranking.severity_values]
critical = 1.0
high = 0.75
medium = 0.5
low = 0.25

[ranking.confidence_values]
battle-tested = 1.0
production-validated = 0.8
peer-reviewed = 0.6
speculative = 0.3

[context_budget]
summary_threshold = 2000
standard_threshold = 8000

[ingestion]
bible_dir = "bible/"
auto_export = true

[validation]
query_rule_ratio_warning = 10
staleness_default_days = 365

[authority]
preference_threshold = 0.0749
ai_provisional_confidence_ceiling = "speculative"
ai_promoted_confidence_ceiling = "peer-reviewed"

[gate]
novelty_threshold = 0.85
redundancy_threshold = 0.95

[review]
unreviewed_warning_percentage = 0.10
unreviewed_warning_floor = 5

[frequency]
graduation_threshold = 50
graduation_ratio_minimum = 0.75
zero_frequency_window_days = 90

[origin_context]
db_path = "~/.cache/writ/origin_context.db"

[enforcement]
methodology_absorb.enabled = false